<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Piano Sheet Music</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111;
        background: #fff;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      h1 {
        font-size: 24px;
        font-weight: 650;
        margin: 0 0 20px;
      }

      figure {
        margin: 0;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #e5e5e5;
      }

      figcaption {
        margin-top: 12px;
        font-size: 14px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>C Major Scale</h1>
      <figure>
        <img src="./assets/c-major-scale.png" alt="C Major Scale sheet music" />
        <figcaption>Ascending and descending C major scale in eighth notes.</figcaption>
      </figure>
    </main>
  </body>
</html>
